name: payments-platform-ci

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ feature/*,hotfix/* ]
jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pydantic requests prometheus-fastapi-instrumentator pytest pytest-cov httpx

      - name: "Run Unit Tests (DORA: Quality Check)" 
        env:        
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest -vv -s --durations=5 tests/

      - name: Build Docker Image        
        run: |
          docker build -t payments-api -f docker/Dockerfile .

      - name: Verify Container Startup (Smoke Test)        
        run: |
          docker run -d -p 8000:8000 --name test-container payments-api
          sleep 5
          docker ps | grep test-container
          docker stop test-container
